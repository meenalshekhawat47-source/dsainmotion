<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${content.hero.title}">Study Page</title>

    <!-- ALL CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/trees-shared.css}">
    <link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- ✅ NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ✅ MAIN PAGE -->
<div class="page-wrap">

    <!-- 🔥 HERO -->
    <div class="page-hero">
        <h1 th:text="${content.hero.title}">Title</h1>
        <p th:text="${content.hero.description}">Description</p>

        <!-- ✅ BACK BUTTON -->
        <a href="/study-vault" class="back-btn">← Back to Vault</a>
    </div>

    <!-- 🔥 SECTIONS -->
    <div th:each="section : ${content.sections}">

        <!-- TEXT -->
        <div th:if="${section.type == 'text'}" class="section">
            <h2 th:text="${section.title}"></h2>
            <p th:text="${section.content}"></p>
        </div>

        <!-- LIST -->
        <div th:if="${section.type == 'list'}" class="section">
            <h2 th:text="${section.title}"></h2>
            <ul>
                <li th:each="item : ${section.items}" th:text="${item}"></li>
            </ul>
        </div>

        <!-- CARDS -->
        <div th:if="${section.type == 'cards'}" class="section">
            <h2 th:text="${section.title}"></h2>

            <div class="card-grid">
                <div class="op-card" th:each="item : ${section.items}">
                    <h3 th:text="${item.title}"></h3>
                    <p th:text="${item.description}"></p>
                </div>
            </div>
        </div>

        <!-- PROS CONS -->
        <div th:if="${section.type == 'pros_cons'}" class="section">
            <h2 th:text="${section.title}"></h2>

            <div class="pros-cons-grid">
                <div class="pros-box">
                    <h3>Advantages</h3>
                    <ul>
                        <li th:each="p : ${section.advantages}" th:text="${p}"></li>
                    </ul>
                </div>

                <div class="cons-box">
                    <h3>Disadvantages</h3>
                    <ul>
                        <li th:each="c : ${section.disadvantages}" th:text="${c}"></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- CODE -->
        <div th:if="${section.type == 'code'}" class="section">
            <h2 th:text="${section.title}"></h2>
            <pre th:text="${section.content}"></pre>
        </div>

    </div>

    <!-- ✅ FEEDBACK -->
    <div th:replace="~{fragments/feedback :: feedback}"></div>

</div>

</body>
</html>
